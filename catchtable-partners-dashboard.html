    // ---- 헬퍼 ----
    function extractVideoId(input) {
      if (!input) return null;
      const s = String(input).trim();
      if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
      try {
        const url = new URL(s);
        const host = url.hostname.replace(/^www\.|^m\./, "");
        if (host === "youtu.be") {
          const id = url.pathname.split("/").filter(Boolean)[0];
          return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
        }
        if (host.endsWith("youtube.com")) {
          const v = url.searchParams.get("v");
          if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
          const parts = url.pathname.split("/").filter(Boolean);
          const idx = parts.findIndex(p => ["shorts","embed","live"].includes(p));
          if (idx >= 0 && parts[idx+1] && /^[a-zA-Z0-9_-]{11}$/.test(parts[idx+1])) return parts[idx+1];
        }
      } catch(e) {}
      return null;
    }
    function formatNumber(n) {
      if (n === null || n === undefined || n === "") return "—";
      const num = Number(String(n).replace(/,/g, ""));
      if (Number.isNaN(num)) return String(n);
      return num.toLocaleString("ko-KR");
    }
    function formatKRW(n) {
      if (n === null || n === undefined || n === "") return "—";
      const num = Number(String(n).replace(/,/g, ""));
      if (Number.isNaN(num)) return String(n);
      return num.toLocaleString("ko-KR") + "원";
    }
    function parseSheetNumber(v) {
      if (v === null || v === undefined) return 0;
      const s = String(v).replace(/,/g, "").trim();
      if (!s || s === "-" || s === "—") return 0;
      const n = Number(s);
      return Number.isNaN(n) ? 0 : n;
    }
 
    // ---- 정산 주기 계산 ----
    // 규칙:
    //  사이클 A: 매월 둘째주 수요일 ~ 월말일  → 지급일 = 익월 둘째주 수요일
    //  사이클 B: 월말일 ~ 익월 둘째주 수요일  → 지급일 = 익월 말일
    //  (즉, 지급일 = "다음 사이클의 마감일")
    function getSecondWednesday(year, month) {
      // month: 0-indexed (0=1월)
      const first = new Date(year, month, 1);
      const dow = first.getDay(); // 0=일 ~ 6=토, 3=수
      const daysUntilWed = (3 - dow + 7) % 7;
      const firstWed = 1 + daysUntilWed;
      return new Date(year, month, firstWed + 7);
    }
    function getLastDayOfMonth(year, month) {
      return new Date(year, month + 1, 0);
    }
    function atMidnight(d) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }
    function calculatePayoutDate(clickDate) {
      const d = atMidnight(clickDate);
      const year = d.getFullYear();
      const month = d.getMonth();
      const secWed       = atMidnight(getSecondWednesday(year, month));
      const lastDay      = atMidnight(getLastDayOfMonth(year, month));
      const nextSecWed   = atMidnight(getSecondWednesday(year, month + 1));
      const nextLastDay  = atMidnight(getLastDayOfMonth(year, month + 1));
      // 사이클 A: [secWed, lastDay) → 지급 = 익월 둘째주 수
      if (d >= secWed && d < lastDay) return nextSecWed;
      // 사이클 B: [lastDay, ...) → 지급 = 익월 말일
      if (d >= lastDay) return nextLastDay;
      // d < secWed → 직전 월말일 이후 시작된 사이클 B → 지급 = 이번 달 말일
      return lastDay;
    }
    const WEEKDAY_KR = ["일","월","화","수","목","금","토"];
    function formatDateKR(d) {
      if (!d) return "—";
      const x = new Date(d);
      const y = x.getFullYear();
      const m = String(x.getMonth() + 1).padStart(2, "0");
      const day = String(x.getDate()).padStart(2, "0");
      return `${y}-${m}-${day} (${WEEKDAY_KR[x.getDay()]})`;
    }
 
    // ---- Apps Script 웹훅 ----
    async function fetchInfluencerDataFromAppsScript(apiUrl, influencer) {
      if (!apiUrl) throw new Error("Apps Script URL이 설정되지 않았습니다.");
      const url = `${apiUrl}?influencer=${encodeURIComponent(influencer)}`;
      const res = await fetch(url, { method: "GET", redirect: "follow" });
      if (!res.ok) throw new Error(`Apps Script HTTP ${res.status}`);
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      return json;
    }
    async function fetchManagerDataFromAppsScript(apiUrl) {
      if (!apiUrl) throw new Error("Apps Script URL이 설정되지 않았습니다.");
      const res = await fetch(apiUrl, { method: "GET", redirect: "follow" });
      if (!res.ok) throw new Error(`Apps Script HTTP ${res.status}`);
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      return json;
    }
    async function postPayoutToAppsScript(apiUrl, payload) {
      if (!apiUrl) throw new Error("Apps Script URL이 설정되지 않았습니다.");
      const res = await fetch(apiUrl, {
        method: "POST",
        // Apps Script 웹앱은 application/json 프리플라이트가 번거로우니 text/plain 사용
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
        redirect: "follow",
      });
      if (!res.ok) throw new Error(`Apps Script HTTP ${res.status}`);
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      return json;
    }
 
    // ---- 인플루언서 공유 링크 생성 ----
    function buildInfluencerShareUrl(influencerName, apiUrl) {
      const base = typeof window !== "undefined"
        ? `${window.location.origin}${window.location.pathname}`
        : "";
      const params = new URLSearchParams();
      params.set("influencer", influencerName);
      if (apiUrl) params.set("api", apiUrl);
      return `${base}?${params.toString()}`;
    }
 
    // ---- 시트 파싱 ----
    function parseSheetRows(rows) {
      if (!rows || rows.length === 0) return { items: [], headerIdx: -1 };
 
      let headerIdx = -1;
      let headerRow = null;
      for (let i = 0; i < rows.length; i++) {
        if (rows[i] && rows[i].some(c => String(c || "").trim() === "링크삽입일")) {
          headerIdx = i;
          headerRow = rows[i];
          break;
        }
      }
      if (headerIdx < 0) return { items: [], headerIdx: -1, error: "시트에서 '링크삽입일' 헤더를 찾지 못했습니다." };
 
      const col = {};
      headerRow.forEach((c, i) => { col[String(c || "").trim()] = i; });
 
      const items = [];
      let currentInfluencer = null;
 
      for (let i = headerIdx + 1; i < rows.length; i++) {
        const row = rows[i] || [];
        const first = String(row[0] || "").trim();
 
        if (!first && row.every(c => !String(c || "").trim())) continue;
        if (/^TOTAL/i.test(first)) continue;
 
        const looksLikeGroup = /\(\s*[\d.]+\s*만\s*\)/.test(first) || /youtube\.com\//.test(first) || /@[\w_-]+/.test(first);
        const hasContentLink = col["콘텐츠 링크"] !== undefined && row[col["콘텐츠 링크"]] && String(row[col["콘텐츠 링크"]]).trim();
        const hasStoreLink   = col["매장 링크"] !== undefined && row[col["매장 링크"]] && String(row[col["매장 링크"]]).trim();
        const hasStore       = col["매장"] !== undefined && row[col["매장"]] && String(row[col["매장"]]).trim();
 
        if (looksLikeGroup && !hasContentLink && !hasStoreLink && !hasStore) {
          const m = first.match(/^([^(（]+?)\s*[\(（]\s*([\d.]+)\s*만\s*[\)）]/);
          const name = m ? m[1].trim() : first.split(/\s+/)[0].replace(/\(.*\)/g, "").trim();
          const subs = m ? m[2] + "만" : "";
          const urlMatch = first.match(/https?:\/\/[^\s]+/);
          currentInfluencer = { name, subscribers: subs, channelUrl: urlMatch ? urlMatch[0] : "" };
          continue;
        }
 
        if (!hasStore && !hasContentLink && !hasStoreLink) continue;
 
        const get = (k) => col[k] !== undefined ? row[col[k]] : undefined;
        const contentUrl = String(get("콘텐츠 링크") || "").trim();
 
        items.push({
          influencer: currentInfluencer?.name || "(미지정)",
          influencerSubs: currentInfluencer?.subscribers || "",
          influencerChannelUrl: currentInfluencer?.channelUrl || "",
          insertDate:   String(get("링크삽입일") || "").trim(),
          publishDate:  String(get("콘텐츠 발행일") || "").trim(),
          trackingDate: String(get("트래킹 완료일") || "").trim(),
          channel:      String(get("매체") || "").trim(),
          store:        String(get("매장") || "").trim(),
          contentUrl,
          storeUrl:     String(get("매장 링크") || "").trim(),
          sheetViews:    parseSheetNumber(get("조회")),
          sheetLikes:    parseSheetNumber(get("좋아요")),
          sheetComments: parseSheetNumber(get("댓글")),
          clicks:        parseSheetNumber(get("클릭 유저")),
          cpc:           parseSheetNumber(get("클릭 유저당 비용")),
          incentive:     parseSheetNumber(get("인센티브")),
          partnerFee:    parseSheetNumber(get("제휴 비용")),
          totalCost:     parseSheetNumber(get("총 비용")),
          reservations:  parseSheetNumber(get("예약 발생(dining)") ?? get("예약 발생")),
          apiViews: null, apiLikes: null, apiComments: null,
          title: "", thumb: "",
          videoId: extractVideoId(contentUrl),
        });
      }
 
      return { items, headerIdx };
    }
 
    // ---- YouTube 배치 ----
    async function fetchYoutubeBatch(videoIds, apiKey) {
      if (!videoIds || videoIds.length === 0) return {};
      const chunks = [];
      for (let i = 0; i < videoIds.length; i += 50) chunks.push(videoIds.slice(i, i + 50));
      const map = {};
      for (const chunk of chunks) {
        const ep = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${chunk.join(",")}&key=${encodeURIComponent(apiKey)}`;
        const res = await fetch(ep);
        const json = await res.json();
        if (!res.ok) throw new Error(json?.error?.message || `YouTube API HTTP ${res.status}`);
        (json.items || []).forEach(v => { map[v.id] = v; });
      }
      return map;
    }
 
    // ---- Sheets API ----
    async function fetchSheetMeta(sheetId, accessToken) {
      const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?fields=sheets(properties(sheetId,title))`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json?.error?.message || `Sheets meta HTTP ${res.status}`);
      return json;
    }
    async function fetchSheetValues(sheetId, sheetTitle, accessToken) {
      const range = encodeURIComponent(`${sheetTitle}!A1:Z500`);
      const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?valueRenderOption=UNFORMATTED_VALUE`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json?.error?.message || `Sheets values HTTP ${res.status}`);
      return json.values || [];
    }

    function InfluencerCard({ group, appsScriptUrl, pendingForThis = [], completedForThis = [], onPayoutUpdate }) {
      const [copied, setCopied] = useState(false);
      const clickRate = group.totalViews ? (group.totalClicks / group.totalViews * 100) : 0;
      const reservationRate = group.totalClicks ? (group.totalReservations / group.totalClicks * 100) : 0;
 
      // 정산 처리 상태 (완료 or 취소 공용 모달)
      const [confirmTarget, setConfirmTarget] = useState(null); // { row, action: 'confirm'|'cancel' }
      const [processing, setProcessing] = useState(false);
      const [resultMsg, setResultMsg] = useState("");
 
      const copyShareLink = async () => {
        const shareUrl = buildInfluencerShareUrl(group.name, appsScriptUrl);
        try {
          await navigator.clipboard.writeText(shareUrl);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch(e) {
          window.prompt("아래 URL을 복사해 인플루언서에게 전달하세요:", shareUrl);
        }
      };
 
      const runAction = async () => {
        if (!confirmTarget) return;
        setProcessing(true); setResultMsg("");
        try {
          const actionName = confirmTarget.action === "confirm" ? "confirmPayout" : "cancelPayout";
          const resp = await postPayoutToAppsScript(appsScriptUrl, {
            action: actionName,
            rowNumber: confirmTarget.row.rowNumber,
          });
          if (confirmTarget.action === "confirm") {
            const emailedMsg = resp.emailed
              ? " · 인플루언서에게 알림 메일 발송"
              : " · 이메일 미등록(수동 통보 필요)";
            setResultMsg(`✓ ${confirmTarget.row.influencer} ${resp.nth}차 정산 완료${emailedMsg}`);
          } else {
            setResultMsg(`✓ ${confirmTarget.row.influencer} 요청 취소 처리됨`);
          }
          setConfirmTarget(null);
          if (onPayoutUpdate) await onPayoutUpdate();
          // 3초 후 메시지 자동 숨김
          setTimeout(() => setResultMsg(""), 5000);
        } catch (e) {
          setResultMsg(`✗ 처리 실패: ${e.message}`);
        } finally {
          setProcessing(false);
        }

    function exportToExcel(items) {
      if (typeof XLSX === "undefined") { alert("엑셀 라이브러리를 불러오지 못했습니다."); return; }
      const rows = items.map(it => {
        const views = it.apiViews !== null ? it.apiViews : it.sheetViews;
        const likes = it.apiLikes !== null ? it.apiLikes : it.sheetLikes;
        const comments = it.apiComments !== null ? it.apiComments : it.sheetComments;
        return {
          "인플루언서": it.influencer,
          "매체": it.channel,
          "매장": it.store,
          "콘텐츠 링크": it.contentUrl,
          "매장 링크": it.storeUrl,
          "링크 삽입일": it.insertDate,
          "콘텐츠 발행일": it.publishDate,
          "트래킹 완료일": it.trackingDate,
          "조회": views || 0,
          "좋아요": likes || 0,
          "댓글": comments || 0,
          "클릭": it.clicks,
          "인센티브(원)": it.incentive,
          "예약(건)": it.reservations,
          "CPC": it.clicks ? Math.round(it.incentive / it.clicks) : 0,
          "클릭률(%)": views ? Number((it.clicks / views * 100).toFixed(3)) : 0,
          "예약 전환율(%)": it.clicks ? Number((it.reservations / it.clicks * 100).toFixed(2)) : 0,
        };
      });
      const ws = XLSX.utils.json_to_sheet(rows);
      ws["!cols"] = [
        { wch: 14 },{ wch: 8 },{ wch: 22 },{ wch: 40 },{ wch: 32 },
        { wch: 12 },{ wch: 12 },{ wch: 12 },{ wch: 10 },{ wch: 10 },
        { wch: 10 },{ wch: 10 },{ wch: 12 },{ wch: 10 },{ wch: 8 },
        { wch: 10 },{ wch: 12 }
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "미식 파트너스");
      const now = new Date();
      const pad = n => String(n).padStart(2,"0");
      const fname = `catchtable-partners-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.xlsx`;
      XLSX.writeFile(wb, fname);
    }
 
    // ---- 인플루언서 전용 뷰 ----
    function InfluencerView({ influencerName, apiUrl }) {
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [items, setItems] = useState([]);
      const [influencerMeta, setInfluencerMeta] = useState({ subscribers: "", channelUrl: "" });
      const [fetchedAt, setFetchedAt] = useState(null);
      // Apps Script에서 받아온 지난 정산 요청 내역 (시트의 '정산 요청 로그' 탭)
      const [serverPayoutLog, setServerPayoutLog] = useState([]);
 
      // 정산 모달 상태
      const [confirmOpen, setConfirmOpen] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [resultOpen, setResultOpen] = useState(false);
      const [resultPayload, setResultPayload] = useState(null);
      const [submitError, setSubmitError] = useState("");
 
      // 정산 로그 (로컬)
      const [localLog, setLocalLog] = useState([]);
 
      // 인플루언서 이메일 (정산 완료 시 자동 알림 수신용) — per-influencer 로 캐시, 선택 사항
      const [wantsEmailNotification, setWantsEmailNotification] = useState(false);
      const [influencerEmailInput, setInfluencerEmailInput] = useState("");
 
      useEffect(() => {
        try {
          const raw = localStorage.getItem(KEY_PAYOUT_LOG);
          const arr = raw ? JSON.parse(raw) : [];
          setLocalLog(arr.filter(x => x.influencer === influencerName));
          const savedEmail = localStorage.getItem(`${KEY_INFLUENCER_EMAIL}:${influencerName}`) || "";
          setInfluencerEmailInput(savedEmail);
          // 과거에 이메일을 저장했다면 알림 옵션도 기본 ON
          setWantsEmailNotification(!!savedEmail);
        } catch(e) {}
      }, [influencerName]);
 
      const load = async () => {
        setLoading(true); setError("");
        try {
          const data = await fetchInfluencerDataFromAppsScript(apiUrl, influencerName);
          const rows = data.rows || [];
          const { items: parsed, error: parseErr } = parseSheetRows(rows);
          if (parseErr) throw new Error(parseErr);
          const my = parsed.filter(it => it.influencer === influencerName);
          if (my.length === 0) {
            setError(`'${influencerName}' 이름으로 등록된 콘텐츠를 찾지 못했어요. 담당자에게 링크가 맞는지 확인해 주세요.`);
          }
          setItems(my);
          if (my[0]) {
            setInfluencerMeta({
              subscribers: my[0].influencerSubs || "",
              channelUrl:  my[0].influencerChannelUrl || "",
            });
          }
          // 서버에서 내려준 정산 요청 로그 (구버전 Apps Script면 undefined — 빈 배열로 처리)
          setServerPayoutLog(Array.isArray(data.payoutLog) ? data.payoutLog : []);
          setFetchedAt(new Date());
        } catch(e) {
          setError(`데이터 불러오기 실패: ${e.message}`);
        } finally {
          setLoading(false);
        }
      };
 
      useEffect(() => {
        if (!apiUrl) {
          setLoading(false);
          setError("이 링크는 Apps Script URL이 없어 데이터를 불러올 수 없어요. 담당자(sangho.park@catchtable.co.kr)에게 문의해 주세요.");
          return;
        }
        load();
      }, []);
 
      const totals = useMemo(() => {
        const totalClicks = items.reduce((a,it) => a + it.clicks, 0);
        const totalIncentive = items.reduce((a,it) => a + it.incentive, 0);
        const totalViews = items.reduce((a,it) => a + (it.apiViews !== null ? it.apiViews : it.sheetViews), 0);
        return { totalClicks, totalIncentive, totalViews, videoCount: items.length };
      }, [items]);
 
      // 정산 로그를 상태별로 분리:
      //  - '지급 완료' (paid): 실제 입금 완료된 건
      //  - '요청 접수' (requested): 인플루언서가 요청했으나 아직 매니저가 처리 전
      //  - 반려/취소는 서버에서 이미 제외되어 내려옴
      const paidSummary = useMemo(() => {
        const paid = serverPayoutLog.filter(r => String(r.status || "").trim() === "지급 완료");
        return {
          paidAmount:  paid.reduce((a, r) => a + Number(r.amount || 0), 0),
          paidClicks:  paid.reduce((a, r) => a + Number(r.clickCount || 0), 0),
          payoutCount: paid.length,
        };
      }, [serverPayoutLog]);
 
      const requestedSummary = useMemo(() => {
        const req = serverPayoutLog.filter(r => String(r.status || "").trim() === "요청 접수");
        return {
          requestedAmount: req.reduce((a, r) => a + Number(r.amount || 0), 0),
          requestedClicks: req.reduce((a, r) => a + Number(r.clickCount || 0), 0),
          requestCount:    req.length,
        };
      }, [serverPayoutLog]);
 
      // 요청 가능한 금액 = 누적 인센티브 - (이미 지급 완료 + 요청중)
      const available = useMemo(() => {
        const availableAmount = Math.max(0,
          totals.totalIncentive - paidSummary.paidAmount - requestedSummary.requestedAmount);
        const availableClicks = Math.max(0,
          totals.totalClicks - paidSummary.paidClicks - requestedSummary.requestedClicks);
        return { availableAmount, availableClicks };
      }, [totals, paidSummary, requestedSummary]);
 
      const payoutDate = useMemo(() => calculatePayoutDate(new Date()), []);
 
      const submitPayout = async () => {
        setSubmitting(true); setSubmitError("");
 
        // 이메일은 선택 사항 — 체크박스가 ON일 때만 사용
        const email = wantsEmailNotification ? (influencerEmailInput || "").trim() : "";
        if (wantsEmailNotification) {
          if (!email) {
            setSubmitError("이메일 알림을 받으려면 이메일을 입력해주세요. (또는 체크를 해제해도 돼요)");
            setSubmitting(false);
            return;
          }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            setSubmitError("이메일 형식이 올바르지 않아요.");
            setSubmitting(false);
            return;
          }
        }
 
        try {
          const payload = {
            action: "payout",
            influencer: influencerName,
            influencerEmail: email,                      // ★ 완료 시 자동 알림 발송용
            amount: available.availableAmount,           // ★ 누적이 아닌 '이번 요청분'만 전송

        }
      };
 
      const totalPendingAmount = pending.reduce((a, p) => a + Number(p.amount || 0), 0);
 
      if (!apiUrl) return null;
 
      return (
        <>
          <div className="rounded-2xl border-2 border-amber-300 bg-gradient-to-br from-amber-50 to-orange-50 shadow-sm p-5 mb-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <span className="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-amber-500 text-white">
                  <MoneyIcon className="w-5 h-5" />
                </span>
                <div>
                  <h2 className="text-sm font-bold text-amber-900">⏳ 정산 요청 대기</h2>
                  <p className="text-xs text-amber-700">
                    {loading
                      ? "불러오는 중…"
                      : pending.length > 0
                        ? `${pending.length}건 · 합계 ${formatKRW(totalPendingAmount)}`
                        : "처리할 요청 없음"}
                  </p>
                </div>
              </div>
              <button onClick={load} disabled={loading}
                      className="text-xs text-amber-700 hover:text-amber-900 inline-flex items-center gap-1 disabled:opacity-50">
                <RefreshIcon className={`w-4 h-4 ${loading ? "animate-spin" : ""}`} /> 새로고침
              </button>
            </div>
 
            {resultMsg && (
              <div className={`mb-3 text-xs rounded-lg p-2.5 ${
                resultMsg.startsWith("✓")
                  ? "bg-emerald-50 border border-emerald-200 text-emerald-800"
                  : "bg-red-50 border border-red-200 text-red-700"
              }`}>{resultMsg}</div>
            )}
 
            {error && (
              <div className="mb-3 text-xs bg-red-50 border border-red-200 text-red-700 rounded-lg p-2.5">
                {error}
              </div>
            )}
 
            {!loading && !error && pending.length === 0 && (
              <div className="text-center py-4 text-xs text-gray-500">
                대기 중인 정산 요청이 없어요. 인플루언서가 [정산 요청하기]를 누르면 여기에 떠요.
              </div>
            )}
 
            {pending.length > 0 && (
              <ul className="space-y-2">
                {pending.map(p => (
                  <li key={p.rowNumber}
                      className="flex items-center justify-between gap-3 bg-white rounded-xl border border-amber-200 p-3 hover:shadow-sm">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-bold text-gray-900">{p.influencer}</span>
                        <span className="text-xs text-gray-500">
                          {p.requestedAt ? new Date(p.requestedAt).toLocaleString("ko-KR") : ""} 요청
                        </span>
                        {p.email && (
                          <span className="text-xs text-indigo-600 truncate max-w-[200px]">· {p.email}</span>
                        )}
                      </div>
                      <div className="text-xs text-gray-500 mt-0.5">
                        콘텐츠 {p.videoCount}개 · 클릭 {formatNumber(p.clickCount)}회 · 지급예정 {formatDateKR(p.payoutDate)}
                      </div>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <button onClick={() => setConfirmTarget(p)}
                              className="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-bold hover:bg-emerald-700 shadow-sm">
                        <CheckIcon className="w-4 h-4" /> {formatKRW(p.amount)} 정산 완료
                      </button>
                    </div>
                  </li>
                ))}
              </ul>
            )}
 
            {/* 최근 완료 내역 (접이식) */}
            {completed.length > 0 && (
              <details className="mt-4 group">
                <summary className="text-xs text-amber-700 cursor-pointer hover:text-amber-900 inline-flex items-center gap-1 select-none">
                  최근 처리 완료 ({completed.length}건) ▾
                </summary>
                <ul className="mt-2 space-y-1 text-xs">
                  {completed.slice(0, 10).map(c => (
                    <li key={c.rowNumber} className="flex justify-between text-gray-600 py-0.5">
                      <span>
                        <span className="inline-block w-12 text-emerald-600 font-semibold">✓완료</span>
                        {c.influencer} · {c.requestedAt ? new Date(c.requestedAt).toLocaleDateString("ko-KR") : ""}
                      </span>
                      <span className="tabular-nums">{formatKRW(c.amount)}</span>
                    </li>
                  ))}
                </ul>
              </details>
            )}
          </div>
 
          {/* 정산 완료 확인 모달 */}
          {confirmTarget && (
            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
                <h3 className="text-lg font-bold text-gray-900 mb-3">정산 완료 처리</h3>
                <p className="text-sm text-gray-600 mb-4">
                  <span className="font-semibold text-amber-700">실제로 송금을 완료하셨나요?</span><br/>
                  확인하면 되돌릴 수 없어요.
                </p>
                <ul className="text-xs text-gray-600 mb-4 space-y-1 pl-4 list-disc">
                  <li>시트 '처리 상태' → <b className="text-emerald-700">지급 완료</b>로 업데이트</li>
                  <li>인플루언서에게 <b>N차 정산 완료 알림 메일</b> 자동 발송 {confirmTarget.email ? `(${confirmTarget.email})` : "(이메일 미등록)"}</li>
                  <li>인플루언서 대시보드에 '지급 완료' 반영</li>
                </ul>
                <div className="rounded-xl border border-gray-200 bg-gray-50 p-4 mb-4 space-y-2 text-sm">
                  <div className="flex justify-between"><span className="text-gray-500">인플루언서</span><span className="font-semibold">{confirmTarget.influencer}</span></div>
                  <div className="flex justify-between"><span className="text-gray-500">금액</span><span className="font-bold text-rose-700">{formatKRW(confirmTarget.amount)}</span></div>
                  <div className="flex justify-between"><span className="text-gray-500">요청일</span><span>{confirmTarget.requestedAt ? new Date(confirmTarget.requestedAt).toLocaleString("ko-KR") : "—"}</span></div>
                  <div className="flex justify-between"><span className="text-gray-500">알림 이메일</span><span className="text-xs text-gray-700">{confirmTarget.email || "(미등록)"}</span></div>
                </div>
                <div className="flex gap-2 justify-end">
                  <button onClick={() => setConfirmTarget(null)} disabled={processing}
                          className="px-4 py-2 rounded-xl border border-gray-300 text-sm font-semibold hover:bg-gray-50 disabled:opacity-50">
                    취소
                  </button>
                  <button onClick={confirmPayout} disabled={processing}
                          className="px-4 py-2 rounded-xl bg-emerald-600 text-white text-sm font-semibold hover:bg-emerald-700 disabled:opacity-60 inline-flex items-center gap-1.5">
                    {processing ? <><LoaderIcon className="w-4 h-4 animate-spin" /> 처리 중…</> : <>네, 정산 완료로 처리</>}
                  </button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }
 
    // ---- 메인 ----
    function App() {
      const [clientId, setClientId] = useState("");
      const [ytApiKey, setYtApiKey] = useState("");
      const [sheetId, setSheetId] = useState(DEFAULT_SHEET_ID);
      const [sheetGid, setSheetGid] = useState(DEFAULT_SHEET_GID);
      const [appsScriptUrl, setAppsScriptUrl] = useState("");
      const [incentivePerClick, setIncentivePerClick] = useState(DEFAULT_INCENTIVE);
 
      const [accessToken, setAccessToken] = useState(null);
      const [tokenExpiry, setTokenExpiry] = useState(0);
      const [userEmail, setUserEmail] = useState("");
 
      const [loading, setLoading] = useState(false);
      const [status, setStatus] = useState("");
      const [error, setError] = useState("");
      const [items, setItems] = useState([]);
      const [lastFetched, setLastFetched] = useState(null);
 
      const tokenClientRef = useRef(null);
      const [gisReady, setGisReady] = useState(
        typeof window !== "undefined" && !!window.google?.accounts?.oauth2
      );
 
      const [configLoaded, setConfigLoaded] = useState(false);
      const [configCollapsed, setConfigCollapsed] = useState(false);
 
      useEffect(() => {
        try {
          setClientId(localStorage.getItem(KEY_CLIENT_ID) || DEFAULT_CLIENT_ID);
          setYtApiKey(localStorage.getItem(KEY_YT_API_KEY) || DEFAULT_YT_API_KEY);
          setSheetId(localStorage.getItem(KEY_SHEET_ID) || DEFAULT_SHEET_ID);
          setSheetGid(localStorage.getItem(KEY_SHEET_GID) || DEFAULT_SHEET_GID);
          setAppsScriptUrl(localStorage.getItem(KEY_APPS_SCRIPT_URL) || DEFAULT_APPS_SCRIPT_URL);
          const savedInc = localStorage.getItem(KEY_INCENTIVE);
          if (savedInc) setIncentivePerClick(Number(savedInc) || DEFAULT_INCENTIVE);
        } catch(e) {}
        setConfigLoaded(true);
      }, []);
 
      // 정산 요청/완료 로그 (모든 인플루언서 카드에서 공유) — App 최상위에서 1회 fetch 후 분배
      const [payoutQueue, setPayoutQueue] = useState({ pending: [], completed: [], loading: false, error: "" });
      const loadPayoutQueue = async () => {
        if (!appsScriptUrl) return;
        setPayoutQueue(q => ({ ...q, loading: true, error: "" }));
        try {
          const data = await fetchManagerDataFromAppsScript(appsScriptUrl);
          setPayoutQueue({
            pending:   Array.isArray(data.pending)   ? data.pending   : [],
            completed: Array.isArray(data.completed) ? data.completed : [],
            loading: false,
            error: "",
          });
        } catch(e) {
          setPayoutQueue(q => ({ ...q, loading: false, error: e.message }));
        }
      };
      useEffect(() => { if (configLoaded && appsScriptUrl) loadPayoutQueue(); }, [configLoaded, appsScriptUrl]);
 
      // 설정값 자동 저장 — 타이핑/붙여넣기 즉시 localStorage 반영
      useEffect(() => { if (configLoaded) { try { localStorage.setItem(KEY_CLIENT_ID, clientId); } catch(e) {} } }, [clientId, configLoaded]);
      useEffect(() => { if (configLoaded) { try { localStorage.setItem(KEY_YT_API_KEY, ytApiKey); } catch(e) {} } }, [ytApiKey, configLoaded]);
      useEffect(() => { if (configLoaded) { try { localStorage.setItem(KEY_SHEET_ID, sheetId); } catch(e) {} } }, [sheetId, configLoaded]);
      useEffect(() => { if (configLoaded) { try { localStorage.setItem(KEY_SHEET_GID, sheetGid); } catch(e) {} } }, [sheetGid, configLoaded]);
      useEffect(() => { if (configLoaded) { try { localStorage.setItem(KEY_APPS_SCRIPT_URL, appsScriptUrl); } catch(e) {} } }, [appsScriptUrl, configLoaded]);
      useEffect(() => { if (configLoaded) { try { localStorage.setItem(KEY_INCENTIVE, String(incentivePerClick)); } catch(e) {} } }, [incentivePerClick, configLoaded]);
 
      // GIS(Google Identity Services) 라이브러리 로드 폴링 — async/defer 로 인한 레이스 컨디션 방지
      useEffect(() => {
        if (gisReady) return;
        let timer = null;
        const check = () => {
          if (window.google?.accounts?.oauth2) {
            setGisReady(true);
          } else {
            timer = setTimeout(check, 200);
          }
        };
        check();
        return () => { if (timer) clearTimeout(timer); };
      }, [gisReady]);
 
      const initTokenClient = () => {
        if (!clientId) return false;
        if (!window.google?.accounts?.oauth2) return false;
        try {
          tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: "https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.email",
            callback: (resp) => {
              if (resp.error) {
                setError(`구글 인증 실패: ${resp.error_description || resp.error}`);
                return;
              }
              setAccessToken(resp.access_token);
              setTokenExpiry(Date.now() + (resp.expires_in || 3600) * 1000);
              fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
                headers: { Authorization: `Bearer ${resp.access_token}` }
              }).then(r => r.json()).then(j => setUserEmail(j.email || ""));
            },
          });
          return true;
        } catch(e) {
          console.error(e);
          return false;
        }
      };
 
      useEffect(() => {
        if (!gisReady || !clientId) return;
        initTokenClient();
      }, [clientId, gisReady]);
 
      const signIn = () => {
        if (!clientId) { setError("Google OAuth 클라이언트 ID를 먼저 입력해주세요."); return; }
        // 혹시 아직 초기화가 안 됐다면 즉석에서 한 번 더 시도
        if (!tokenClientRef.current) {
          if (!window.google?.accounts?.oauth2) {
            setError("구글 인증 라이브러리(gsi/client)가 아직 로드되지 않았어요. 인터넷 연결과 광고 차단 확장 프로그램을 확인하고, 현재 주소가 http://localhost:... 인지 확인해 주세요. (file:// 로 열면 차단됩니다.)");
            return;
          }
          if (!initTokenClient()) {
            setError("구글 인증 클라이언트 초기화에 실패했어요. 클라이언트 ID를 다시 확인해 주세요.");
            return;
          }
        }
        setError("");
        try { localStorage.setItem(KEY_CLIENT_ID, clientId); } catch(e) {}
        tokenClientRef.current.requestAccessToken();
      };
 
      const signOut = () => {
        if (accessToken && window.google?.accounts?.oauth2) {
          window.google.accounts.oauth2.revoke(accessToken, () => {});
        }
        setAccessToken(null); setTokenExpiry(0); setUserEmail(""); setItems([]);
      };
 
      const loadData = async () => {
        setError(""); setStatus("");
        if (!accessToken) { setError("먼저 구글 로그인을 해주세요."); return; }
        if (!sheetId) { setError("스프레드시트 ID를 입력해주세요."); return; }
        if (!ytApiKey) { setError("YouTube API 키를 입력해주세요."); return; }
 
        setLoading(true);
        try {
          setStatus("스프레드시트 메타데이터 조회 중…");
          const meta = await fetchSheetMeta(sheetId, accessToken);
          const targetSheet = meta.sheets.find(s => String(s.properties.sheetId) === String(sheetGid));
          const sheetTitle = targetSheet ? targetSheet.properties.title : meta.sheets[0].properties.title;
 
          setStatus(`'${sheetTitle}' 탭에서 데이터 가져오는 중…`);
          const values = await fetchSheetValues(sheetId, sheetTitle, accessToken);
 
          const { items: parsed, error: parseErr } = parseSheetRows(values);
          if (parseErr) { setError(parseErr); setLoading(false); return; }
 
          setStatus(`${parsed.length}개 콘텐츠 파싱 완료. YouTube 지표 조회 중…`);
 
          const videoIds = [...new Set(parsed.map(it => it.videoId).filter(Boolean))];
          let ytMap = {};
          if (videoIds.length > 0) {
            try { ytMap = await fetchYoutubeBatch(videoIds, ytApiKey); }
            catch(e) { setError(`YouTube API 조회 실패: ${e.message}`); }
          }
 
          const enriched = parsed.map(it => {
            if (it.videoId && ytMap[it.videoId]) {
              const v = ytMap[it.videoId];
              return {
                ...it,
                apiViews: Number(v.statistics?.viewCount || 0),
                apiLikes: Number(v.statistics?.likeCount || 0),
                apiComments: Number(v.statistics?.commentCount || 0),
                title: v.snippet?.title || "",
                thumb: v.snippet?.thumbnails?.default?.url || "",
              };
            }
            return it;
          });
 
          setItems(enriched);
          setLastFetched(new Date());
          setStatus(`완료 — 콘텐츠 ${enriched.length}개, YouTube 수치 ${Object.keys(ytMap).length}개 수집`);
 
          try {
            localStorage.setItem(KEY_CLIENT_ID, clientId);
            localStorage.setItem(KEY_YT_API_KEY, ytApiKey);
            localStorage.setItem(KEY_SHEET_ID, sheetId);
            localStorage.setItem(KEY_SHEET_GID, sheetGid);
            localStorage.setItem(KEY_APPS_SCRIPT_URL, appsScriptUrl);
            localStorage.setItem(KEY_INCENTIVE, String(incentivePerClick));
          } catch(e) {}
        } catch(e) {
          setError(`데이터 불러오기 실패: ${e.message}`);
        } finally {
          setLoading(false);
        }
      };
 
      const summary = useMemo(() => {
        if (items.length === 0) return null;
        const totalViews = items.reduce((a,it) => a + (it.apiViews !== null ? it.apiViews : it.sheetViews), 0);
        const totalLikes = items.reduce((a,it) => a + (it.apiLikes !== null ? it.apiLikes : it.sheetLikes), 0);
        const totalComments = items.reduce((a,it) => a + (it.apiComments !== null ? it.apiComments : it.sheetComments), 0);
        const totalClicks = items.reduce((a,it) => a + it.clicks, 0);
        const totalIncentive = items.reduce((a,it) => a + it.incentive, 0);
        const totalReservations = items.reduce((a,it) => a + it.reservations, 0);
        const totalPartnerFee = items.reduce((a,it) => a + it.partnerFee, 0);
        return {
          count: items.length,
          totalViews, totalLikes, totalComments,
          totalClicks, totalIncentive, totalReservations, totalPartnerFee,
          totalCost: totalIncentive + totalPartnerFee,
          avgCpc: totalClicks ? totalIncentive / totalClicks : 0,
          clickRate: totalViews ? (totalClicks / totalViews * 100) : 0,
          reservationRate: totalClicks ? (totalReservations / totalClicks * 100) : 0,
        };
      }, [items]);
 
      const influencerGroups = useMemo(() => {
        const map = new Map();
        items.forEach(it => {
          const key = it.influencer || "(미지정)";
          if (!map.has(key)) {
            map.set(key, {
              name: key,
              subscribers: it.influencerSubs,
              channelUrl: it.influencerChannelUrl,
              items: [],
              totalViews: 0, totalLikes: 0, totalComments: 0,
              totalClicks: 0, totalIncentive: 0, totalReservations: 0,
            });
          }
          const g = map.get(key);
          g.items.push(it);
          g.totalViews += (it.apiViews !== null ? it.apiViews : it.sheetViews);
          g.totalLikes += (it.apiLikes !== null ? it.apiLikes : it.sheetLikes);
          g.totalComments += (it.apiComments !== null ? it.apiComments : it.sheetComments);
          g.totalClicks += it.clicks;
          g.totalIncentive += it.incentive;
          g.totalReservations += it.reservations;
        });
        return Array.from(map.values()).sort((a,b) => b.totalClicks - a.totalClicks);
      }, [items]);
 
      const [sortKey, setSortKey] = useState("clicks");
      const [sortDir, setSortDir] = useState("desc");
      const sortedItems = useMemo(() => {
        const getVal = (it, k) => {
          if (k === "views") return it.apiViews !== null ? it.apiViews : it.sheetViews;
          if (k === "likes") return it.apiLikes !== null ? it.apiLikes : it.sheetLikes;
          if (k === "comments") return it.apiComments !== null ? it.apiComments : it.sheetComments;
          return it[k] || 0;
        };
        return [...items].sort((a,b) => {
          const diff = Number(getVal(b, sortKey)) - Number(getVal(a, sortKey));
          return sortDir === "desc" ? diff : -diff;
        });
      }, [items, sortKey, sortDir]);
      const toggleSort = (k) => {
        if (sortKey === k) setSortDir(d => d === "desc" ? "asc" : "desc");
        else { setSortKey(k); setSortDir("desc"); }
      };
      const ThSort = ({ k, label }) => (
        <th className="py-2 px-2 text-right cursor-pointer hover:text-indigo-600" onClick={() => toggleSort(k)}>
          {label}{sortKey === k ? (sortDir === "desc" ? " ↓" : " ↑") : ""}
        </th>
      );
 
      const isLoggedIn = !!accessToken && Date.now() < tokenExpiry;
 
      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 via-white to-indigo-50 p-6">
          <div className="max-w-7xl mx-auto">
            <header className="flex items-center gap-3 mb-6">
              <span className="inline-flex items-center justify-center w-11 h-11 rounded-2xl bg-indigo-600">
                <TableIcon className="w-6 h-6 text-white" />
              </span>
              <div className="flex-1">
                <h1 className="text-2xl font-bold text-gray-900">캐치테이블 미식 파트너스 대시보드</h1>
                <p className="text-sm text-gray-500">인플루언서 맛집 리뷰 링크 삽입 성과 — 조회/좋아요/댓글 + 클릭 + 인센티브</p>
              </div>
              {isLoggedIn && (
                <div className="flex items-center gap-2 text-xs text-gray-600">
                  <span className="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-full px-2 py-1">
                    <CheckIcon className="w-3 h-3" /> 로그인됨 {userEmail && `· ${userEmail}`}
                  </span>
                  <button onClick={signOut} className="inline-flex items-center gap-1 text-gray-500 hover:text-red-600">
                    <LogoutIcon className="w-4 h-4" /> 로그아웃
                  </button>
                </div>
              )}
            </header>
 
            <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 mb-6">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-2">
                  <h2 className="text-sm font-bold text-gray-900">연동 설정</h2>
                  <span className="text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-full px-2 py-0.5 inline-flex items-center gap-1">
                    <CheckIcon className="w-3 h-3" /> 자동 저장
                  </span>
                </div>
                <button onClick={() => setConfigCollapsed(v => !v)}
                        className="text-xs text-gray-500 hover:text-indigo-600">
                  {configCollapsed ? "설정 펼치기" : "설정 접기"}
                </button>
              </div>
              {!configCollapsed && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="flex items-center gap-1.5 text-sm font-semibold text-gray-700 mb-1.5">
                    <GoogleIcon className="w-4 h-4" /> Google OAuth 클라이언트 ID
                  </label>
                  <input type="text" value={clientId} onChange={e=>setClientId(e.target.value)}
                         placeholder="xxxxx.apps.googleusercontent.com"
                         className="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <div>
                  <label className="flex items-center gap-1.5 text-sm font-semibold text-gray-700 mb-1.5">
                    <KeyIcon className="w-4 h-4" /> YouTube Data API v3 키
                  </label>
                  <input type="password" value={ytApiKey} onChange={e=>setYtApiKey(e.target.value)}
                         placeholder="AIzaSy..."
                         className="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <div>
                  <label className="flex items-center gap-1.5 text-sm font-semibold text-gray-700 mb-1.5">
                    <SheetIcon className="w-4 h-4" /> 스프레드시트 ID
                  </label>
                  <input type="text" value={sheetId} onChange={e=>setSheetId(e.target.value)}
                         className="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <div>
                  <label className="flex items-center gap-1.5 text-sm font-semibold text-gray-700 mb-1.5">
                    <SheetIcon className="w-4 h-4" /> 시트 탭 GID
                  </label>
                  <input type="text" value={sheetGid} onChange={e=>setSheetGid(e.target.value)}
                         className="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <div className="md:col-span-2">
                  <label className="flex items-center gap-1.5 text-sm font-semibold text-gray-700 mb-1.5">
                    <MoneyIcon className="w-4 h-4" /> Apps Script 웹앱 URL <span className="text-xs font-normal text-gray-400">(인플루언서 정산 링크용)</span>
                  </label>
                  <input type="text" value={appsScriptUrl} onChange={e=>setAppsScriptUrl(e.target.value)}
                         placeholder="https://script.google.com/macros/s/.../exec"
                         className="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
              </div>
              )}
 
              <div className="mt-4 flex flex-wrap items-center gap-2">
                {!isLoggedIn ? (
                  <button onClick={signIn}
                          className="inline-flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-white border border-gray-300 text-sm font-semibold hover:bg-gray-50">
                    <GoogleIcon className="w-4 h-4" /> 구글 로그인
                  </button>
                ) : (
                  <button onClick={loadData} disabled={loading}
                          className="inline-flex items-center gap-1.5 px-5 py-2.5 rounded-xl bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 disabled:opacity-60">
                    {loading ? (<><LoaderIcon className="w-4 h-4 animate-spin" /> 불러오는 중</>) :
                               (<><RefreshIcon className="w-4 h-4" /> 데이터 새로 불러오기</>)}
                  </button>
                )}
                {lastFetched && (
                  <span className="text-xs text-gray-500">마지막 업데이트: {lastFetched.toLocaleString("ko-KR")}</span>
                )}
                {items.length > 0 && (
                  <button onClick={() => exportToExcel(items)}
                          className="ml-auto inline-flex items-center gap-1.5 px-3 py-2 rounded-xl border border-emerald-200 bg-emerald-50 text-emerald-700 text-xs font-semibold hover:bg-emerald-100">
                    <DownloadIcon className="w-4 h-4" /> 엑셀 다운로드
                  </button>
                )}
              </div>
              {status && <p className="mt-2 text-xs text-gray-500">{status}</p>}
            </div>
 
            {error && (
              <div className="mb-6 flex items-start gap-2 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-800">
                <AlertIcon className="w-5 h-5 flex-shrink-0 mt-0.5" />
                <div>
                  <div className="font-semibold">문제가 발생했어요</div>
                  <div>{error}</div>
                </div>
              </div>
            )}
 
            {!isLoggedIn && !items.length && !error && (
              <div className="mb-6 rounded-2xl border border-indigo-200 bg-indigo-50 p-5 text-sm text-indigo-900">
                <h3 className="font-bold mb-2">처음 사용 안내</h3>
                <ol className="list-decimal list-inside space-y-1 text-xs leading-relaxed">
                  <li>Google Cloud Console에서 <b>OAuth 2.0 클라이언트 ID</b>를 '웹 애플리케이션'으로 발급 → 승인된 JavaScript 원본에 <code>http://localhost:8000</code>(혹은 띄울 포트) 등록</li>
                  <li>같은 프로젝트에서 <b>Google Sheets API</b>와 <b>YouTube Data API v3</b>를 '사용 설정'</li>
                  <li>이 HTML은 <code>file://</code>에서는 OAuth가 동작하지 않아요. 폴더에서 <code>python -m http.server 8000</code> 로 띄우고 <code>http://localhost:8000/…</code>로 접속해 주세요.</li>
                  <li>클라이언트 ID, YouTube API 키 입력 후 [구글 로그인] → [데이터 새로 불러오기]</li>
                </ol>
              </div>
            )}
 
            {summary && (
              <>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
                  <KpiCard icon={EyeIcon}     label="총 조회수" accent="bg-indigo-500"
                           value={formatNumber(summary.totalViews)} subtitle={`콘텐츠 ${summary.count}개`} />
                  <KpiCard icon={ClickIcon}   label="총 클릭" accent="bg-sky-500"
                           value={formatNumber(summary.totalClicks)} subtitle={`클릭률 ${summary.clickRate.toFixed(2)}%`} />
                  <KpiCard icon={MoneyIcon}   label="총 인센티브" accent="bg-rose-500"
                           value={formatKRW(summary.totalIncentive)} subtitle={`CPC 평균 ${Math.round(summary.avgCpc)}원`} />
                  <KpiCard icon={ReserveIcon} label="총 예약" accent="bg-emerald-500"
                           value={formatNumber(summary.totalReservations) + "건"} subtitle={`전환율 ${summary.reservationRate.toFixed(1)}%`} />
                  <KpiCard icon={ThumbsIcon}  label="총 좋아요" accent="bg-amber-500"
                           value={formatNumber(summary.totalLikes)} />
                  <KpiCard icon={MsgIcon}     label="총 댓글" accent="bg-violet-500"
                           value={formatNumber(summary.totalComments)} />
                </div>
 
                <div className="mb-6">
                  <div className="flex items-center justify-between mb-3">
                    <h2 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                      <UserIcon className="w-5 h-5 text-gray-500" /> 인플루언서별 성과
                    </h2>
                    {!appsScriptUrl && (
                      <span className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-full px-2 py-1">
                        Apps Script URL 미설정 — 정산 링크는 데이터 로딩이 안 돼요
                      </span>
                    )}
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {influencerGroups.map(g => (
                      <InfluencerCard
                        key={g.name}
                        group={g}
                        appsScriptUrl={appsScriptUrl}
                        pendingForThis={payoutQueue.pending.filter(p => p.influencer === g.name)}
                        completedForThis={payoutQueue.completed.filter(c => c.influencer === g.name)}
                        onPayoutUpdate={loadPayoutQueue}
                      />
                    ))}
                  </div>
                </div>
 
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-6">
                  <RankingList title="클릭 TOP 5" icon={ClickIcon} accent="bg-sky-500"
                               items={items} valueKey="clicks" valueLabel="클릭" />
                  <RankingList title="예약 TOP 5" icon={ReserveIcon} accent="bg-emerald-500"
                               items={items} valueKey="reservations" valueLabel="건" />
                  <RankingList title="인센티브 TOP 5" icon={MoneyIcon} accent="bg-rose-500"
                               items={items} valueKey="incentive" valueLabel="원"
                               formatFn={(v) => formatKRW(v)} />
                </div>
 
                <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="text-base font-bold text-gray-900 flex items-center gap-2">
                      <TrophyIcon className="w-5 h-5 text-gray-500" /> 콘텐츠 상세 ({items.length})
                    </h3>
                    <p className="text-xs text-gray-400">헤더를 클릭하면 정렬이 바뀝니다</p>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="text-xs text-gray-500 border-b border-gray-200">
                          <th className="text-left py-2 px-2">인플루언서</th>
                          <th className="text-left py-2 px-2">매체</th>
                          <th className="text-left py-2 px-2">매장</th>
                          <ThSort k="views" label="조회" />
                          <ThSort k="likes" label="좋아요" />
                          <ThSort k="comments" label="댓글" />
                          <ThSort k="clicks" label="클릭" />
                          <ThSort k="incentive" label="인센티브" />
                          <ThSort k="reservations" label="예약" />
                          <th className="text-right py-2 px-2">CPC</th>
                        </tr>
                      </thead>
                      <tbody>
                        {sortedItems.map((it, idx) => {
                          const views = it.apiViews !== null ? it.apiViews : it.sheetViews;
                          const likes = it.apiLikes !== null ? it.apiLikes : it.sheetLikes;
                          const comments = it.apiComments !== null ? it.apiComments : it.sheetComments;
                          const cpc = it.clicks ? Math.round(it.incentive / it.clicks) : 0;
                          return (
                            <tr key={idx} className="border-b border-gray-100 hover:bg-gray-50">
                              <td className="py-2 px-2 text-gray-700 whitespace-nowrap">{it.influencer}</td>
                              <td className="py-2 px-2 text-gray-600">{it.channel}</td>
                              <td className="py-2 px-2">
                                {it.contentUrl ? (
                                  <a href={it.contentUrl} target="_blank" rel="noreferrer"
                                     className="text-gray-900 font-medium hover:text-indigo-600">
                                    {it.store}
                                  </a>
                                ) : <span>{it.store}</span>}
                                {it.storeUrl && (
                                  <a href={it.storeUrl} target="_blank" rel="noreferrer" className="ml-1 text-xs text-indigo-500 hover:underline">·예약</a>
                                )}
                              </td>
                              <td className="py-2 px-2 text-right tabular-nums text-gray-800">{formatNumber(views)}</td>
                              <td className="py-2 px-2 text-right tabular-nums text-rose-700">{formatNumber(likes)}</td>
                              <td className="py-2 px-2 text-right tabular-nums text-amber-700">{formatNumber(comments)}</td>
                              <td className="py-2 px-2 text-right tabular-nums text-sky-700 font-semibold">{formatNumber(it.clicks)}</td>
                              <td className="py-2 px-2 text-right tabular-nums text-rose-700 font-semibold">{formatKRW(it.incentive)}</td>
                              <td className="py-2 px-2 text-right tabular-nums text-emerald-700 font-semibold">{formatNumber(it.reservations)}</td>
                              <td className="py-2 px-2 text-right tabular-nums text-gray-600">{cpc ? `${cpc}원` : "—"}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </>
            )}
 
            <footer className="mt-8 text-center text-xs text-gray-400">
              Google Sheets API · YouTube Data API v3 · 클릭 데이터는 Airbridge 기반 수기 집계
            </footer>
          </div>
        </div>
      );
    }
 
    // ---- Google Sign-In: JWT 디코드 (UTF-8 안전) ----
    function decodeJwtPayload(token) {
      try {
        const payloadB64 = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        // atob 후 바이트 → UTF-8 문자열 복원 (한글 이름 깨짐 방지)
        const bytes = atob(payloadB64);
        const utf8 = decodeURIComponent(
          Array.from(bytes).map(c => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)).join("")
        );
        return JSON.parse(utf8);
      } catch (e) {
        return null;
      }
    }
 
    // ---- 매니저 대시보드 도메인 로그인 게이트 ----
    function DomainLoginGate({ children }) {
      const [authUser, setAuthUser] = useState(null); // { email, name, picture, token }
      const [authError, setAuthError] = useState("");
      const [authChecked, setAuthChecked] = useState(false);
      const [gidReady, setGidReady] = useState(
        typeof window !== "undefined" && !!window.google?.accounts?.id
      );
      const buttonRef = useRef(null);
 
      // 저장된 토큰 복원
      useEffect(() => {
        try {
          const saved = localStorage.getItem(KEY_AUTH_TOKEN);
          if (saved) {
            const p = decodeJwtPayload(saved);
            const email = p ? String(p.email || "").toLowerCase() : "";
            const valid = p && p.exp * 1000 > Date.now() && email.endsWith("@" + ALLOWED_AUTH_DOMAIN);
            if (valid) {
              setAuthUser({ email: p.email, name: p.name, picture: p.picture, token: saved });
            } else {
              localStorage.removeItem(KEY_AUTH_TOKEN);
            }
          }
        } catch (e) {}
        setAuthChecked(true);
      }, []);
 
      // GIS id 라이브러리 로드 대기
      useEffect(() => {
        if (gidReady) return;
        let timer;
        const check = () => {
          if (window.google?.accounts?.id) setGidReady(true);
          else timer = setTimeout(check, 200);
        };
        check();
        return () => timer && clearTimeout(timer);
      }, [gidReady]);
 
      // Sign in with Google 버튼 렌더
      useEffect(() => {
        if (!gidReady || authUser || !buttonRef.current) return;
        window.google.accounts.id.initialize({
          client_id: DEFAULT_CLIENT_ID,
          auto_select: false,
          hd: ALLOWED_AUTH_DOMAIN, // Workspace 계정 힌트
          callback: (resp) => {
            const p = decodeJwtPayload(resp.credential);
            if (!p) { setAuthError("로그인 응답을 해석하지 못했어요. 다시 시도해주세요."); return; }
            const email = String(p.email || "").toLowerCase();
            if (!email.endsWith("@" + ALLOWED_AUTH_DOMAIN)) {
              setAuthError(`이 대시보드는 @${ALLOWED_AUTH_DOMAIN} 계정으로만 접속할 수 있어요. (로그인 시도: ${email || "(알 수 없음)"})`);
              return;
            }
            try { localStorage.setItem(KEY_AUTH_TOKEN, resp.credential); } catch(e) {}
            setAuthUser({ email: p.email, name: p.name, picture: p.picture, token: resp.credential });
            setAuthError("");
          },
        });
        window.google.accounts.id.renderButton(buttonRef.current, {
          theme: "filled_blue",
          size: "large",
          text: "signin_with",
          shape: "pill",
          logo_alignment: "left",
          width: 280,
        });
      }, [gidReady, authUser]);
 
      const signOut = () => {
        try { localStorage.removeItem(KEY_AUTH_TOKEN); } catch(e) {}
        if (window.google?.accounts?.id) {
          window.google.accounts.id.disableAutoSelect();
        }
        setAuthUser(null);
        setAuthError("");
      };
 
      // 로드 직후 깜빡임 방지
      if (!authChecked) {
        return (
          <div className="min-h-screen flex items-center justify-center text-gray-400 text-sm">
            불러오는 중…
          </div>
        );
      }
 
      // 로그인된 상태 — 상단 우측에 사용자 뱃지 띄우고 대시보드 렌더
      if (authUser) {
        return (
          <>
            <div className="fixed top-3 right-3 z-40 flex items-center gap-2 bg-white shadow-md rounded-full border border-gray-200 pl-1 pr-3 py-1 text-xs">
              {authUser.picture
                ? <img src={authUser.picture} referrerPolicy="no-referrer" className="w-6 h-6 rounded-full" alt="" />
                : <span className="w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 inline-flex items-center justify-center text-[10px] font-bold">{(authUser.name || authUser.email || "?")[0]}</span>}
              <span className="text-gray-700 font-medium max-w-[180px] truncate">
                {authUser.name || authUser.email}
              </span>
              <button onClick={signOut}
                      className="ml-1 text-gray-400 hover:text-red-600 text-[11px] border-l border-gray-200 pl-2">
                로그아웃
              </button>
            </div>
            {children}
          </>
        );
      }
 
      // 미로그인 — 로그인 화면
      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 via-white to-indigo-50 flex items-center justify-center p-6">
          <div className="bg-white rounded-3xl shadow-xl max-w-md w-full p-8 text-center">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4">
              <TableIcon className="w-8 h-8 text-white" />
            </div>
            <h1 className="text-2xl font-bold text-gray-900 mb-2">캐치테이블 미식 파트너스</h1>
            <p className="text-sm text-gray-600 mb-6 leading-relaxed">
              매니저 대시보드는 <b className="text-indigo-600">@{ALLOWED_AUTH_DOMAIN}</b> Google 계정으로만
              접속할 수 있어요.
            </p>
            <div ref={buttonRef} className="flex justify-center mb-4 min-h-[44px]" />
            {!gidReady && (
              <p className="text-xs text-gray-400">Google 로그인 버튼을 불러오는 중…</p>
            )}
            {authError && (
              <div className="mt-4 text-sm bg-red-50 border border-red-200 text-red-700 rounded-xl p-3 text-left">
                {authError}
              </div>
            )}
            <p className="mt-6 text-[11px] text-gray-400 leading-relaxed">
              인플루언서분들은 매니저가 공유해준 <b>개인 정산 링크</b>로 접속하시면
              <br/>로그인 없이 본인 성과를 확인할 수 있어요.
            </p>
          </div>
        </div>
      );
    }
 
    function Root() {
      if (IS_INFLUENCER_MODE) {
        return <InfluencerView influencerName={URL_INFLUENCER} apiUrl={URL_API} />;
      }
      return (
        <DomainLoginGate>
          <App />
        </DomainLoginGate>
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
